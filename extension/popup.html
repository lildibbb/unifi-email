<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Email Blast - Outlook Connector</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      background: #09090b;
      color: #fafafa;
      width: 280px;
      min-height: 120px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid #27272a;
    }
    .logo {
      width: 28px; height: 28px;
      border-radius: 4px;
      background: #ff5e00;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; color: #fff; font-size: 13px; flex-shrink: 0;
    }
    .title { font-weight: 600; font-size: 13px; }
    .subtitle { font-size: 11px; color: #a1a1aa; }
    .body { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }
    .status-row { display: flex; align-items: center; gap: 8px; }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #a1a1aa; flex-shrink: 0;
      transition: background .2s;
    }
    .dot.ok   { background: #22c55e; box-shadow: 0 0 8px #22c55e; }
    .dot.busy { background: #f59e0b; animation: pulse 1.2s infinite; }
    .dot.err  { background: #ef4444; box-shadow: 0 0 8px #ef4444; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    #status-text { font-size: 12px; color: #a1a1aa; flex: 1; }
    #status-text.ok { color: #fafafa; }
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 8px 14px; border-radius: 6px;
      font-size: 12px; font-weight: 500;
      cursor: pointer; border: 1px solid transparent;
      transition: all .15s ease;
      width: 100%;
    }
    .btn:disabled { opacity: .35; cursor: not-allowed; }
    .btn-primary { background: #ff5e00; color: #fff; font-weight: 600; }
    .btn-primary:hover:not(:disabled) { background: #e05200; }
    .btn-danger { background: transparent; border-color: #27272a; color: #ef4444; }
    .btn-danger:hover:not(:disabled) { background: rgba(239,68,68,.08); border-color: #ef4444; }
    .spin {
      display: inline-block; width: 12px; height: 12px;
      border: 2px solid rgba(255,255,255,.25); border-top-color: currentColor;
      border-radius: 50%; animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hint { font-size: 11px; color: #52525b; text-align: center; }
    .open-link { color: #ff5e00; text-decoration: none; cursor: pointer; }
    .open-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">N</div>
    <div>
      <div class="title">Email Blast</div>
      <div class="subtitle">Outlook Connector</div>
    </div>
  </div>
  <div class="body">
    <div class="status-row">
      <div class="dot" id="dot"></div>
      <span id="status-text">Checking...</span>
    </div>
    <button class="btn btn-primary" id="btn-connect" onclick="doConnect()">Connect Outlook</button>
    <button class="btn btn-danger"  id="btn-disconnect" onclick="doDisconnect()" style="display:none">Disconnect</button>
    <div class="hint">
      Open the <a class="open-link" href="#" onclick="openApp()">Email Blast web app</a> to send emails.
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
